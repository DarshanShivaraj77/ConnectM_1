<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectM Handbook</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  background: #020617;
}

.aurora {
  position: fixed;
  inset: -50%;
  filter: blur(120px);
  z-index: -1;
  background:
    radial-gradient(circle at 20% 30%, #22d3ee 0%, transparent 40%),
    radial-gradient(circle at 70% 40%, #3b82f6 0%, transparent 45%),
    radial-gradient(circle at 50% 70%, #facc15 0%, transparent 45%);
  animation: auroraMove 18s ease-in-out infinite alternate;
}

@keyframes auroraMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(200px, -150px); }
}

.section-card {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
  width: 100%;
  max-width: 420px;
  margin: 20px;
}

.section-header {
  padding: 30px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

.logo-img {
  width: 160px;
  margin-bottom: 8px;
}

.section-tag {
  font-size: 13px;
  color: #666;
  font-weight: 500;
}

.section-body {
  padding: 28px;
  text-align: center;
}

.section-body h3 {
  margin-bottom: 20px;
  color: #0f172a;
  font-weight: 600;
}

input {
  width: 100%;
  padding: 12px 16px;
  margin-bottom: 16px;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-size: 14px;
}

.hero-btn {
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  margin-bottom: 10px;
}

.primary {
  background: linear-gradient(135deg, #22d3ee, #2563eb);
  color: white;
}

.secondary {
  background: #facc15;
  color: #0f172a;
}

.error {
  color: #ef4444;
  margin-top: 10px;
  font-size: 13px;
  padding: 10px;
  background: rgba(239, 68, 68, 0.1);
  border-radius: 8px;
}

a {
  text-decoration: none;
  display: block;
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #888;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="aurora"></div>

<div class="section-card">
  <div class="section-header">
    <img src="https://www.connectm.com/wp-content/uploads/2025/11/logo-ConnectM-1.svg"
         alt="ConnectM Logo"
         class="logo-img">
    <div class="section-tag">Secure Handbook Access</div>
  </div>

  <div class="section-body">

    {% if session.user %}

      <h3>Welcome {{ session.user }}</h3>

      <a href="/handbook">
        <button class="hero-btn primary">Automative Cluster</button>
      </a>

      <a href="/iot-command">
        <button class="hero-btn primary">IoT Command Section</button>
      </a>


      <a href="/alm" target="_blank">
        <button class="hero-btn primary">Asset Lifecycle Management</button>
      </a>
      <a href="/bms-iot" target="_blank">
        <button class="hero-btn primary">BMS IoT Device Manual</button>
      </a>

      {% if session.role == "admin" %}
      <a href="/add_user">
        <button class="hero-btn secondary">Add User</button>
      </a>
      {% endif %}

      <a href="/logout">
        <div class="footer">Logout</div>
      </a>

    {% else %}

      <form method="post" action="/">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="hero-btn primary">Login</button>
      </form>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <div class="footer">© ConnectM</div>

    {% endif %}

  </div>
</div>

</body>
</html>
